<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mon Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --pink:#e879a0;--pink-l:#fce7f3;--pink-m:#f9a8d4;--pink-d:#be185d;
  --purple:#a855f7;--purple-l:#f3e8ff;--purple-m:#d8b4fe;--purple-d:#7e22ce;
  --blue:#3b82f6;--blue-l:#eff6ff;--blue-m:#93c5fd;--blue-d:#1d4ed8;
  --green:#10b981;--green-l:#ecfdf5;--green-m:#6ee7b7;--green-d:#047857;
  --orange:#f97316;--orange-l:#fff7ed;--orange-m:#fdba74;--orange-d:#c2410c;
  --text:#1e1b2e;--text-s:#64748b;--text-m:#94a3b8;
  --white:#ffffff;--bg:#f8f7fc;--border:#e2e8f0;
  --rad:14px;--rad-s:8px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
header{background:var(--white);border-bottom:1px solid var(--border);padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;gap:1rem}
.logo{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--pink-d);white-space:nowrap;letter-spacing:-0.5px}
.logo em{color:var(--purple-d);font-style:normal}
.header-right{display:flex;gap:8px;align-items:center}
.btn{border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px;border-radius:999px}
.btn-icon{width:34px;height:34px;border-radius:50%;background:var(--bg);color:var(--text-s);font-size:.9rem;justify-content:center;padding:0;border:1px solid var(--border)}
.btn-icon:hover{background:var(--pink-l);color:var(--pink-d);border-color:var(--pink-m)}
.btn-add{background:var(--pink-d);color:white;padding:7px 16px;font-size:.82rem}
.btn-add:hover{background:var(--pink);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text-s);padding:6px 12px;font-size:.8rem;border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg);border-color:var(--text-m)}

/* LAYOUT */
.app{display:flex;flex:1;overflow:hidden;height:calc(100vh - 58px)}
.sidebar{width:260px;min-width:260px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:1rem .75rem}
.main{flex:1;overflow-y:auto;padding:1.25rem}

/* SIDEBAR */
.nav-label{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-m);margin:1rem 0 .4rem .6rem}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--rad-s);cursor:pointer;font-size:.84rem;color:var(--text-s);transition:all .12s;margin-bottom:1px}
.nav-item:hover,.nav-item.active{background:var(--pink-l);color:var(--pink-d)}
.nav-item.active{font-weight:600}
.nav-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--pink-d);color:white;font-size:.6rem;font-weight:700;padding:1px 6px;border-radius:20px}
.sidebar-count{margin-left:auto;font-size:.72rem;color:var(--text-m)}

/* MINI CAL */
.mini-cal{padding:.75rem;background:var(--pink-l);border-radius:var(--rad);margin-bottom:.75rem}
.mini-cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.mini-cal-title{font-weight:600;font-size:.82rem;color:var(--pink-d)}
.mini-nav-btn{background:none;border:none;cursor:pointer;color:var(--pink-d);font-size:.85rem;padding:2px 5px;border-radius:4px}
.mini-nav-btn:hover{background:var(--pink-m)}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;text-align:center}
.mini-dow{font-size:.58rem;font-weight:600;color:var(--pink-d);opacity:.6;padding:2px 0}
.mini-day{font-size:.72rem;padding:3px 1px;border-radius:5px;cursor:pointer;color:var(--text-s)}
.mini-day:hover{background:var(--pink-m);color:var(--pink-d)}
.mini-day.today{background:var(--pink-d);color:white;font-weight:700}
.mini-day.sel:not(.today){background:var(--pink-m);color:var(--pink-d)}
.mini-day.other{color:var(--text-m)}
.mini-day.has-e::after{content:'';display:block;width:3px;height:3px;border-radius:50%;background:var(--pink-d);margin:1px auto 0}

/* MAIN SECTIONS */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.section-title{font-size:1.35rem;font-weight:700;color:var(--text)}
.section-sub{font-size:.78rem;color:var(--text-s);margin-top:1px}

/* PAGE ACCUEIL — URGENTS */
.urgent-banner{background:linear-gradient(135deg,var(--pink-d),#9333ea);border-radius:var(--rad);padding:1.25rem 1.5rem;color:white;margin-bottom:1.25rem;position:relative;overflow:hidden}
.urgent-banner::before{content:'⚡';position:absolute;right:1.2rem;top:50%;transform:translateY(-50%);font-size:4rem;opacity:.12}
.urgent-banner h2{font-size:1.1rem;font-weight:700;margin-bottom:2px}
.urgent-banner p{font-size:.8rem;opacity:.85}

.urgents-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.75rem;margin-bottom:1.5rem}
.urgent-card{background:var(--white);border-radius:var(--rad-s);border:1px solid var(--border);padding:.9rem 1rem;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.urgent-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.urgent-card:hover{transform:translateY(-2px);border-color:var(--text-m)}
.urgent-card.type-devoir::before{background:var(--purple-d)}
.urgent-card.type-ds::before{background:var(--orange-d)}
.urgent-card.type-cours::before{background:var(--blue-d)}
.urgent-card.type-perso::before{background:var(--pink-d)}
.urgent-card .uc-mat{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.urgent-card .uc-titre{font-weight:600;font-size:.88rem;margin-bottom:4px}
.urgent-card .uc-date{font-size:.75rem;color:var(--text-s);display:flex;align-items:center;gap:5px}
.urgent-card .uc-badge{font-size:.65rem;font-weight:600;padding:2px 7px;border-radius:20px;margin-left:auto}
.badge-red{background:#fee2e2;color:#dc2626}
.badge-orange{background:#ffedd5;color:#c2410c}
.badge-green{background:#dcfce7;color:#15803d}

/* VUE EMPLOI DU TEMPS */
.edt-grid{background:var(--white);border-radius:var(--rad);border:1px solid var(--border);overflow:hidden}
.edt-hdr{display:grid;grid-template-columns:52px repeat(5,1fr);background:var(--bg);border-bottom:1px solid var(--border)}
.edt-day-col{text-align:center;padding:.55rem .25rem;border-right:1px solid var(--border)}
.edt-day-name{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-s)}
.edt-day-num{font-size:1rem;font-weight:700;color:var(--text);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:.15rem auto 0}
.edt-day-num.today{background:var(--pink-d);color:white}
.edt-body{display:grid;grid-template-columns:52px repeat(5,1fr);max-height:500px;overflow-y:auto}
.edt-time-col{border-right:1px solid var(--border)}
.edt-time-slot{height:48px;border-bottom:1px solid var(--bg);display:flex;align-items:flex-start;padding:2px 5px;font-size:.62rem;color:var(--text-m)}
.edt-col{border-right:1px solid var(--border);position:relative}
.edt-slot{height:48px;border-bottom:1px solid var(--bg);cursor:pointer;transition:background .1s}
.edt-slot:hover{background:var(--pink-l)}
.edt-evt{position:absolute;left:2px;right:2px;border-radius:5px;font-size:.68rem;padding:3px 5px;font-weight:600;overflow:hidden;cursor:pointer;z-index:2}
.edt-evt:hover{filter:brightness(.9)}

/* CARDS LISTE */
.evt-card{background:var(--white);border-radius:var(--rad-s);border:1px solid var(--border);padding:.75rem 1rem;display:flex;align-items:flex-start;gap:.75rem;margin-bottom:.5rem;cursor:pointer;transition:all .15s}
.evt-card:hover{border-color:var(--pink-m);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.evt-bar{width:4px;border-radius:2px;min-height:32px;align-self:stretch;flex-shrink:0}
.evt-info{flex:1;min-width:0}
.evt-titre{font-weight:600;font-size:.88rem;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.evt-meta{font-size:.75rem;color:var(--text-s);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.evt-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.evt-card:hover .evt-actions{opacity:1}
.act-btn{width:26px;height:26px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.75rem;transition:all .1s}
.act-edit{background:var(--blue-l);color:var(--blue-d)}
.act-del{background:#fee2e2;color:#dc2626}
.act-btn:hover{transform:scale(1.1)}

/* MATIERE BADGE */
.mat-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:.68rem;font-weight:600}

/* SECTION DATES */
.date-label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-m);margin-bottom:.4rem;margin-top:1rem;padding-left:.1rem}

/* STAT CARDS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.6rem;margin-bottom:1.25rem}
.stat-card{background:var(--white);border-radius:var(--rad-s);border:1px solid var(--border);padding:.85rem;text-align:center}
.stat-n{font-size:1.6rem;font-weight:700;line-height:1}
.stat-l{font-size:.7rem;color:var(--text-s);margin-top:3px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(15,10,30,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;transition:opacity .2s;pointer-events:none}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:white;border-radius:18px;width:100%;max-width:470px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.18);transform:translateY(12px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-hdr{padding:1.2rem 1.4rem 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:1.05rem;font-weight:700;color:var(--text)}
.modal-body{padding:1rem 1.4rem 1.4rem}
.form-row{margin-bottom:.85rem}
.form-label{display:block;font-size:.72rem;font-weight:600;color:var(--text-s);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--rad-s);font-family:'Inter',sans-serif;font-size:.85rem;color:var(--text);background:white;transition:border-color .15s;outline:none}
.form-input:focus{border-color:var(--pink-d)}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
select.form-input{cursor:pointer}
.mat-grid{display:flex;flex-wrap:wrap;gap:.35rem}
.mat-opt{padding:4px 11px;border-radius:20px;font-size:.75rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:white;color:var(--text-s);transition:all .12s}
.mat-opt:hover{border-color:var(--text-m);background:var(--bg)}
.mat-opt.sel{color:white;border-color:transparent}
.color-row{display:flex;gap:.4rem;flex-wrap:wrap}
.color-opt{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .12s;flex-shrink:0}
.color-opt.sel{border-color:#1e293b;transform:scale(1.15)}
.modal-footer{display:flex;gap:.5rem;justify-content:flex-end;padding-top:.75rem;border-top:1px solid var(--border)}
.toggle-row{display:flex;align-items:center;justify-content:space-between}
.toggle{position:relative;width:38px;height:21px}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:11px;cursor:pointer;transition:.2s}
.toggle-slider::before{content:'';position:absolute;width:15px;height:15px;left:3px;top:3px;background:white;border-radius:50%;transition:.2s}
.toggle input:checked + .toggle-slider{background:var(--pink-d)}
.toggle input:checked + .toggle-slider::before{transform:translateX(17px)}
.rappel-options{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.5rem}
.rappel-opt{padding:4px 11px;border-radius:20px;font-size:.75rem;cursor:pointer;border:1.5px solid var(--border);background:white;color:var(--text-s);transition:all .12s}
.rappel-opt.sel{background:var(--purple-l);color:var(--purple-d);border-color:var(--purple-m)}

/* TYPE BUTTONS */
.type-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem;margin-bottom:1rem}
.type-btn{padding:8px 4px;border-radius:var(--rad-s);border:1.5px solid var(--border);background:white;cursor:pointer;font-size:.72rem;font-weight:600;color:var(--text-s);transition:all .12s;text-align:center}
.type-btn:hover{border-color:var(--text-m)}
.type-btn.sel{color:white;border-color:transparent}
.type-btn.sel.t-cours{background:var(--blue-d)}
.type-btn.sel.t-devoir{background:var(--purple-d)}
.type-btn.sel.t-ds{background:var(--orange-d)}
.type-btn.sel.t-perso{background:var(--pink-d)}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1e1b2e;color:white;padding:.65rem 1.1rem;border-radius:var(--rad-s);font-size:.82rem;font-weight:500;z-index:500;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}

/* SCROLL */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* EMPTY */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text-m)}
.empty-icon{font-size:2.5rem;margin-bottom:.6rem}
.empty-text{font-size:.85rem}

/* SECTION TABS */
.view-tabs{display:flex;gap:2px;background:var(--bg);border-radius:20px;padding:3px;border:1px solid var(--border)}
.view-tab{padding:5px 13px;border-radius:17px;font-size:.78rem;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text-s);transition:all .12s}
.view-tab.active{background:var(--white);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}

@media(max-width:700px){.sidebar{display:none}.form-row-2{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <div class="logo">mon <em>agenda</em> ✦</div>
  <div class="header-right">
    <button class="btn btn-icon" onclick="changerVue('accueil')" title="Accueil">🏠</button>
    <button class="btn btn-icon" onclick="changerVue('edt')" title="Emploi du temps">📅</button>
    <button class="btn btn-icon" onclick="changerVue('devoirs')" title="Devoirs">📚</button>
    <button class="btn btn-icon" onclick="changerVue('ds')" title="DS">📝</button>
    <button class="btn btn-icon" onclick="changerVue('perso')" title="Perso">💜</button>
    <button class="btn btn-add" onclick="ouvrirModal()">+ Ajouter</button>
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="mini-cal" id="miniCalWrap">
      <div class="mini-cal-hdr">
        <button class="mini-nav-btn" onclick="miniNav(-1)">‹</button>
        <span class="mini-cal-title" id="miniCalTitre"></span>
        <button class="mini-nav-btn" onclick="miniNav(1)">›</button>
      </div>
      <div class="mini-grid" id="miniGrid"></div>
    </div>

    <div class="nav-label">Sections</div>
    <div class="nav-item active" id="nav-accueil" onclick="changerVue('accueil')">🏠 <span>Accueil — Urgents</span></div>
    <div class="nav-item" id="nav-edt" onclick="changerVue('edt')">📅 <span>Emploi du temps</span></div>
    <div class="nav-item" id="nav-devoirs" onclick="changerVue('devoirs')">📚 <span>Devoirs</span> <span class="nav-badge" id="badge-devoirs">0</span></div>
    <div class="nav-item" id="nav-ds" onclick="changerVue('ds')">📝 <span>DS &amp; Contrôles</span></div>
    <div class="nav-item" id="nav-perso" onclick="changerVue('perso')">💜 <span>Perso</span></div>

    <div class="nav-label">Matières</div>
    <div id="sidebar-mats"></div>
  </aside>

  <main class="main" id="mainView"></main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="overlayClick(event)">
<div class="modal">
  <div class="modal-hdr">
    <span class="modal-title" id="modalTitle">Nouvel élément</span>
    <button class="btn btn-icon" onclick="fermerModal()" style="width:30px;height:30px">✕</button>
  </div>
  <div class="modal-body">
    <input type="hidden" id="editId"/>

    <div class="form-row">
      <div class="form-label">Type</div>
      <div class="type-btns">
        <button class="type-btn t-cours sel" onclick="selType(this,'cours')">📅 Cours</button>
        <button class="type-btn t-devoir" onclick="selType(this,'devoir')">📚 Devoir</button>
        <button class="type-btn t-ds" onclick="selType(this,'ds')">📝 DS</button>
        <button class="type-btn t-perso" onclick="selType(this,'perso')">💜 Perso</button>
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">Titre / Description</label>
      <input class="form-input" id="fTitre" placeholder="Ex: Exercice p.47, Contrôle de maths…" onkeydown="if(event.key==='Enter')sauvegarder()"/>
    </div>

    <div id="matRow" class="form-row">
      <div class="form-label">Matière</div>
      <div class="mat-grid" id="matGrid"></div>
    </div>

    <div class="form-row-2">
      <div class="form-row" style="margin:0">
        <label class="form-label">Date</label>
        <input class="form-input" type="date" id="fDate"/>
      </div>
      <div class="form-row" style="margin:0" id="heureRow">
        <label class="form-label">Heure début</label>
        <input class="form-input" type="time" id="fHeure"/>
      </div>
    </div>
    <div class="form-row-2" style="margin-top:.7rem" id="heurefinRow">
      <div class="form-row" style="margin:0">
        <label class="form-label">Heure fin</label>
        <input class="form-input" type="time" id="fHeureFin"/>
      </div>
      <div class="form-row" style="margin:0" id="salleRow">
        <label class="form-label">Salle / Lieu</label>
        <input class="form-input" id="fSalle" placeholder="Salle 201…"/>
      </div>
    </div>

    <div class="form-row" id="noteRow">
      <label class="form-label">Note</label>
      <textarea class="form-input" id="fNote" rows="2" placeholder="Remarques, chapitres concernés…"></textarea>
    </div>

    <div class="form-row">
      <div class="toggle-row">
        <label class="form-label" style="margin:0">Rappel</label>
        <label class="toggle"><input type="checkbox" id="fRappel" onchange="toggleRappel()"/><span class="toggle-slider"></span></label>
      </div>
      <div class="rappel-options" id="rappelOptions" style="display:none">
        <div class="rappel-opt sel" data-j="1" onclick="selRappel(this)">1 jour avant</div>
        <div class="rappel-opt" data-j="2" onclick="selRappel(this)">2 jours avant</div>
        <div class="rappel-opt" data-j="3" onclick="selRappel(this)">3 jours avant</div>
        <div class="rappel-opt" data-j="5" onclick="selRappel(this)">5 jours avant</div>
        <div class="rappel-opt" data-j="7" onclick="selRappel(this)">1 semaine avant</div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="fermerModal()">Annuler</button>
      <button class="btn btn-add" onclick="sauvegarder()">✓ Sauvegarder</button>
    </div>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── DONNÉES ──────────────────────────────────────────────────────────────
var evts = [];
try{ evts = JSON.parse(localStorage.getItem('agenda2_evts')||'[]'); }catch(e){ evts=[]; }

var vue = 'accueil';
var selDate = new Date();
var miniMois = new Date();
var editingId = null;
var filtMat = null;

const MATIERES = ['AII','OI','CGE','CM','CE','EST','MATHS','PHYSIQUE','ESPAGNOL','ANGLAIS'];
const MAT_COLORS = {
  'AII':'#3b82f6','OI':'#8b5cf6','CGE':'#10b981','CM':'#f59e0b',
  'CE':'#ef4444','EST':'#06b6d4','MATHS':'#6366f1','PHYSIQUE':'#f97316',
  'ESPAGNOL':'#ec4899','ANGLAIS':'#14b8a6'
};

const TYPE_COLORS = {
  'cours':   {bg:'#dbeafe',text:'#1d4ed8',bar:'#1d4ed8'},
  'devoir':  {bg:'#ede9fe',text:'#7e22ce',bar:'#7e22ce'},
  'ds':      {bg:'#ffedd5',text:'#c2410c',bar:'#c2410c'},
  'perso':   {bg:'#fce7f3',text:'#be185d',bar:'#be185d'},
};

const MOIS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MOIS_C = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const JOURS = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const JOURS_L = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];

function save(){ try{ localStorage.setItem('agenda2_evts',JSON.stringify(evts)); }catch(e){} }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function dateStr(d){ return d.toISOString().split('T')[0]; }
function today(){ return dateStr(new Date()); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function daysUntil(dateISO){
  var now = new Date(); now.setHours(0,0,0,0);
  var d = new Date(dateISO+'T00:00:00');
  return Math.round((d-now)/86400000);
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────
function changerVue(v){
  vue = v;
  document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('active'); });
  var nav = document.getElementById('nav-'+v);
  if(nav) nav.classList.add('active');
  render();
}

function render(){
  updateBadges();
  updateSidebarMats();
  renderMiniCal();
  if(vue==='accueil') renderAccueil();
  else if(vue==='edt') renderEDT();
  else if(vue==='devoirs') renderDevoirs();
  else if(vue==='ds') renderDS();
  else if(vue==='perso') renderPerso();
}

function updateBadges(){
  var t = today();
  var nb = evts.filter(function(e){ return e.type==='devoir' && e.date>=t; }).length;
  document.getElementById('badge-devoirs').textContent = nb;
}

function updateSidebarMats(){
  var el = document.getElementById('sidebar-mats');
  var t = today();
  var html = MATIERES.map(function(m){
    var nb = evts.filter(function(e){ return e.mat===m && e.date>=t; }).length;
    var c = MAT_COLORS[m];

  }).join('');
  html += filtMat ? '<div class="nav-item" onclick="filtrerMat(null)"><span style="font-size:.8rem">✕</span> Tout voir</div>' : '';
  el.innerHTML = html;
}

function filtrerMat(m){ filtMat = m; render(); }

// ─── ACCUEIL URGENTS ──────────────────────────────────────────────────────
function renderAccueil(){
  var t = today();
  var now = new Date(); now.setHours(0,0,0,0);

  var upcoming = evts.filter(function(e){ return e.date >= t; })
    .sort(function(a,b){ return a.date.localeCompare(b.date); });

  if(filtMat) upcoming = upcoming.filter(function(e){ return e.mat===filtMat; });

  var urgents = upcoming.filter(function(e){
    var j = daysUntil(e.date);
    return j <= 7;
  });

  var plusTard = upcoming.filter(function(e){ return daysUntil(e.date) > 7; });

  var statsDevoir = evts.filter(function(e){ return e.type==='devoir' && e.date>=t; }).length;
  var statsDS = evts.filter(function(e){ return e.type==='ds' && e.date>=t; }).length;
  var statsCours = evts.filter(function(e){ return e.type==='cours'; }).length;
  var statsTotal = evts.length;

  var html = '<div class="urgent-banner">'
    +'<h2>🔥 À faire &amp; à venir</h2>'
    +'<p>Tes prochains devoirs, DS et cours — les plus urgents en premier.</p>'
    +'</div>'
    +'<div class="stats-row">'
    +'<div class="stat-card"><div class="stat-n" style="color:var(--purple-d)">'+statsDevoir+'</div><div class="stat-l">📚 Devoirs</div></div>'
    +'<div class="stat-card"><div class="stat-n" style="color:var(--orange-d)">'+statsDS+'</div><div class="stat-l">📝 DS</div></div>'
    +'<div class="stat-card"><div class="stat-n" style="color:var(--blue-d)">'+statsCours+'</div><div class="stat-l">📅 Cours</div></div>'
    +'<div class="stat-card"><div class="stat-n" style="color:var(--pink-d)">'+statsTotal+'</div><div class="stat-l">Total</div></div>'
    +'</div>';

  if(urgents.length===0 && plusTard.length===0){
    html += '<div class="empty"><div class="empty-icon">🌟</div><div class="empty-text">Rien de prévu — profites-en !<br><button class="btn btn-add" style="margin-top:.8rem" onclick="ouvrirModal()">+ Ajouter quelque chose</button></div></div>';
    document.getElementById('mainView').innerHTML = html;
    return;
  }

  if(urgents.length>0){
    html += '<div class="section-hdr"><div><div class="section-title">Cette semaine</div><div class="section-sub">'+urgents.length+' élément'+(urgents.length>1?'s':'')+' dans les 7 prochains jours</div></div><button class="btn btn-add" onclick="ouvrirModal()">+ Ajouter</button></div>';
    html += '<div class="urgents-grid">';
    urgents.forEach(function(e){
      var j = daysUntil(e.date);
      var badgeClass = j<=1 ? 'badge-red' : j<=3 ? 'badge-orange' : 'badge-green';
      var badgeText = j===0?'Aujourd\'hui':j===1?'Demain':'Dans '+j+'j';
      var tc = TYPE_COLORS[e.type]||TYPE_COLORS.perso;
      html += '<div class="urgent-card type-'+esc(e.type)+'" onclick="ouvrirModalEdit(\''+esc(e.id)+'\')">'
        +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'
        +(e.mat?'<div class="mat-badge" style="background:'+esc(MAT_COLORS[e.mat])+'22;color:'+esc(MAT_COLORS[e.mat])+'">'+esc(e.mat)+'</div>':'')
        +'<div class="mat-badge" style="background:'+esc(tc.bg)+';color:'+esc(tc.text)+'">'+typeLabel(e.type)+'</div>'
        +'</div>'
        +'<div class="uc-titre">'+esc(e.titre)+'</div>'
        +'<div class="uc-date">📅 '+formatDate(e.date)+(e.heure?' · '+esc(e.heure):'')
        +'<span class="uc-badge '+badgeClass+'">'+badgeText+'</span></div>'
        +(e.note?'<div style="font-size:.7rem;color:var(--text-m);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(e.note)+'</div>':'')
        +'</div>';
    });
    html += '</div>';
  }

  if(plusTard.length>0){
    html += '<div style="margin-top:1.25rem"><div class="section-hdr"><div class="section-title" style="font-size:1.1rem">Plus tard</div></div>';
    plusTard.slice(0,6).forEach(function(e){
      html += evtCardHtml(e);
    });
    if(plusTard.length>6) html += '<div style="font-size:.78rem;color:var(--text-m);padding:.3rem .2rem">… et '+(plusTard.length-6)+' autres</div>';
    html += '</div>';
  }

  document.getElementById('mainView').innerHTML = html;
}

function typeLabel(t){
  return t==='cours'?'📅 Cours':t==='devoir'?'📚 Devoir':t==='ds'?'📝 DS':'💜 Perso';
}
function formatDate(iso){
  var d = new Date(iso+'T12:00:00');
  return JOURS_L[d.getDay()]+' '+d.getDate()+' '+MOIS[d.getMonth()];
}

// ─── EMPLOI DU TEMPS ──────────────────────────────────────────────────────
function renderEDT(){
  // Semaine courante (lundi → vendredi)
  var lundi = new Date(selDate);
  var dow = (selDate.getDay()+6)%7;
  lundi.setDate(selDate.getDate()-dow);

  var jours = [];
  for(var i=0;i<5;i++){
    var d = new Date(lundi); d.setDate(lundi.getDate()+i); jours.push(d);
  }
  var heures = []; for(var h=7;h<20;h++) heures.push(h);

  var semLabel = lundi.getDate()+' '+MOIS_C[lundi.getMonth()]+' — '+jours[4].getDate()+' '+MOIS_C[jours[4].getMonth()]+' '+lundi.getFullYear();

  var headCells = jours.map(function(d){
    var isT = dateStr(d)===today();
    return '<div class="edt-day-col"><div class="edt-day-name">'+JOURS[d.getDay()]+'</div>'
      +'<div class="edt-day-num'+(isT?' today':'')+'">'+d.getDate()+'</div></div>';
  }).join('');

  var timeCells = heures.map(function(h){ return '<div class="edt-time-slot">'+(h<10?'0':'')+h+'h</div>'; }).join('');

  var dayCols = jours.map(function(d){
    var iso = dateStr(d);
    var dayEvts = evts.filter(function(e){ return e.type==='cours' && e.date===iso; });
    if(filtMat) dayEvts = dayEvts.filter(function(e){ return e.mat===filtMat; });
    var slots = heures.map(function(h){
      return '<div class="edt-slot" onclick="ouvrirModal(\''+iso+'\',\''+(h<10?'0':'')+h+':00\',\'cours\')"></div>';
    }).join('');
    var evtHtml = dayEvts.filter(function(e){ return e.heure; }).map(function(e){
      var parts = e.heure.split(':');
      var hh = parseInt(parts[0])||7, mm = parseInt(parts[1])||0;
      var top = (hh-7)*48 + Math.round(mm/60*48);
      var hfParts = e.heureFin ? e.heureFin.split(':') : null;
      var hfh = hfParts ? parseInt(hfParts[0])||hh : hh+1;
      var hfm = hfParts ? parseInt(hfParts[1])||0 : 0;
      var height = Math.max((hfh*60+hfm-(hh*60+mm))/60*48, 24);
      var c = e.mat ? MAT_COLORS[e.mat] : '#3b82f6';
      return '<div class="edt-evt" style="top:'+top+'px;height:'+height+'px;background:'+c+'22;color:'+c+';border-left:3px solid '+c+'" onclick="event.stopPropagation();ouvrirModalEdit(\''+esc(e.id)+'\')">'
        +(e.mat?'<b>'+esc(e.mat)+'</b> ':'')+(e.salle?'· '+esc(e.salle):'')
        +'</div>';
    }).join('');
    return '<div class="edt-col">'+slots+evtHtml+'</div>';
  }).join('');

  document.getElementById('mainView').innerHTML =
    '<div class="section-hdr">'
    +'<div><div class="section-title">Emploi du temps</div><div class="section-sub">'+semLabel+'</div></div>'
    +'<div style="display:flex;gap:.5rem">'
    +'<button class="btn btn-ghost" onclick="navSem(-1)">‹</button>'
    +'<button class="btn btn-ghost" onclick="selDate=new Date();render()">Auj.</button>'
    +'<button class="btn btn-ghost" onclick="navSem(1)">›</button>'
    +'<button class="btn btn-add" onclick="ouvrirModal(\''+dateStr(jours[0])+'\',\'\',\'cours\')">+ Cours</button>'
    +'</div></div>'
    +'<div class="edt-grid">'
    +'<div class="edt-hdr"><div class="edt-day-col"></div>'+headCells+'</div>'
    +'<div class="edt-body"><div class="edt-time-col">'+timeCells+'</div>'+dayCols+'</div>'
    +'</div>';
}

function navSem(d){ selDate = new Date(selDate); selDate.setDate(selDate.getDate()+d*7); render(); }

// ─── DEVOIRS ──────────────────────────────────────────────────────────────
function renderDevoirs(){
  var t = today();
  var src = evts.filter(function(e){ return e.type==='devoir'; });
  if(filtMat) src = src.filter(function(e){ return e.mat===filtMat; });
  src.sort(function(a,b){ return a.date.localeCompare(b.date); });

  var html = '<div class="section-hdr"><div><div class="section-title">📚 Devoirs</div><div class="section-sub">'+src.length+' devoir'+(src.length!==1?'s':'')+'</div></div>'
    +'<button class="btn btn-add" onclick="ouvrirModal(null,null,\'devoir\')">+ Devoir</button></div>';

  if(!src.length){
    html += '<div class="empty"><div class="empty-icon">📚</div><div class="empty-text">Aucun devoir — bien joué !</div></div>';
    document.getElementById('mainView').innerHTML = html;
    return;
  }

  var aFaire = src.filter(function(e){ return e.date>=t; });
  var fait = src.filter(function(e){ return e.date<t; });

  if(aFaire.length){
    html += '<div class="date-label">À faire</div>';
    var grouped = {};
    aFaire.forEach(function(e){ if(!grouped[e.date]) grouped[e.date]=[]; grouped[e.date].push(e); });
    Object.keys(grouped).sort().forEach(function(date){
      var j = daysUntil(date);
      var badgeClass = j<=1?'badge-red':j<=3?'badge-orange':'badge-green';
      var badgeText = j===0?'Aujourd\'hui':j===1?'Demain':'Dans '+j+'j';
      html += '<div style="display:flex;align-items:center;gap:.5rem;margin:.75rem 0 .3rem">'
        +'<span style="font-size:.75rem;font-weight:600;color:var(--text-s)">'+formatDate(date)+'</span>'
        +'<span class="uc-badge '+badgeClass+'">'+badgeText+'</span>'
        +'</div>';
      grouped[date].forEach(function(e){ html += evtCardHtml(e); });
    });
  }

  if(fait.length){
    html += '<div class="date-label" style="margin-top:1.5rem">Passés</div>';
    fait.reverse().slice(0,5).forEach(function(e){ html += evtCardHtml(e, true); });
    if(fait.length>5) html += '<div style="font-size:.75rem;color:var(--text-m);padding:.2rem">'+(fait.length-5)+' devoir(s) passé(s) de plus…</div>';
  }

  document.getElementById('mainView').innerHTML = html;
}

// ─── MINI CALENDRIER ──────────────────────────────────────────────────────
function renderMiniCal(){
  var an = miniMois.getFullYear(), m = miniMois.getMonth();
  document.getElementById('miniCalTitre').textContent = MOIS_C[m]+' '+an;
  var premier = new Date(an,m,1), dernier = new Date(an,m+1,0);
  var startDow = (premier.getDay()+6)%7;
  var html = ['L','M','M','J','V','S','D'].map(function(d){ return '<div class="mini-dow">'+d+'</div>'; }).join('');
  for(var i=0;i<startDow;i++){
    var d=new Date(an,m,1-startDow+i);
    html+='<div class="mini-day other">'+d.getDate()+'</div>';
  }
  for(var day=1;day<=dernier.getDate();day++){
    var iso=an+'-'+(m+1<10?'0':'')+(m+1)+'-'+(day<10?'0':'')+day;
    var isT=iso===today(), isSel=iso===dateStr(selDate);
    var hasE=evts.some(function(e){ return e.date===iso; });
    html+='<div class="mini-day'+(isT?' today':'')+(isSel&&!isT?' sel':'')+(hasE?' has-e':'')+'" onclick="miniSelDate(\''+iso+'\')">'+day+'</div>';
  }
  document.getElementById('miniGrid').innerHTML = html;
}
function miniNav(d){ miniMois=new Date(miniMois.getFullYear(),miniMois.getMonth()+d,1); renderMiniCal(); }
function miniSelDate(iso){ selDate=new Date(iso+'T12:00:00'); render(); }

function ouvrirModal(dateISO, heure, type){
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Nouvel élément';
  document.getElementById('editId').value = '';
  document.getElementById('fTitre').value = '';
  document.getElementById('fDate').value = dateISO || today();
  document.getElementById('fHeure').value = heure || '';
  document.getElementById('fHeureFin').value = '';
  document.getElementById('fSalle').value = '';
  document.getElementById('fNote').value = '';
  document.getElementById('fRappel').checked = false;
  document.getElementById('rappelOptions').style.display = 'none';
  document.getElementById('fTitre').style.borderColor = '';

  var t = type || vue === 'edt' ? 'cours' : vue === 'devoirs' ? 'devoir' : vue === 'ds' ? 'ds' : vue === 'perso' ? 'perso' : 'cours';
  document.querySelectorAll('.type-btn').forEach(function(b){ b.classList.remove('sel'); });
  var btn = document.querySelector('.type-btn.t-'+t);
  if(btn) btn.classList.add('sel');
  currentType = t;
  updateModalForType(t);
  buildMatGrid(null);
  document.querySelectorAll('.rappel-opt').forEach(function(o){ o.classList.toggle('sel', o.dataset.j==='1'); });

  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(function(){ document.getElementById('fTitre').focus(); }, 200);
}

function ouvrirModalEdit(id){
  var e = evts.find(function(x){ return x.id===id; });
  if(!e) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Modifier';
  document.getElementById('editId').value = id;
  document.getElementById('fTitre').value = e.titre;
  document.getElementById('fDate').value = e.date;
  document.getElementById('fHeure').value = e.heure||'';
  document.getElementById('fHeureFin').value = e.heureFin||'';
  document.getElementById('fSalle').value = e.salle||'';
  document.getElementById('fNote').value = e.note||'';
  document.getElementById('fRappel').checked = !!e.rappel;
  document.getElementById('rappelOptions').style.display = e.rappel ? 'flex' : 'none';
  document.getElementById('fTitre').style.borderColor = '';

  document.querySelectorAll('.type-btn').forEach(function(b){ b.classList.remove('sel'); });
  var btn = document.querySelector('.type-btn.t-'+e.type);
  if(btn) btn.classList.add('sel');
  currentType = e.type;
  updateModalForType(e.type);
  buildMatGrid(e.mat||null);
  document.querySelectorAll('.rappel-opt').forEach(function(o){ o.classList.toggle('sel', o.dataset.j===(e.rappelJ||'1')); });

  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(function(){ document.getElementById('fTitre').focus(); }, 200);
}

function fermerModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
function overlayClick(ev){ if(ev.target===document.getElementById('modalOverlay')) fermerModal(); }

function sauvegarder(){
  var titre = document.getElementById('fTitre').value.trim();
  if(!titre){ document.getElementById('fTitre').style.borderColor='#dc2626'; document.getElementById('fTitre').focus(); return; }
  document.getElementById('fTitre').style.borderColor='';

  var matEl = document.querySelector('.mat-opt.sel');
  var rappelJEl = document.querySelector('.rappel-opt.sel');

  var evt = {
    id: editingId || uid(),
    type: currentType,
    titre: titre,
    date: document.getElementById('fDate').value || today(),
    heure: document.getElementById('fHeure').value,
    heureFin: document.getElementById('fHeureFin').value,
    salle: document.getElementById('fSalle').value.trim(),
    mat: matEl ? matEl.dataset.mat : null,
    rappel: document.getElementById('fRappel').checked,
    rappelJ: rappelJEl ? rappelJEl.dataset.j : '1',
    note: document.getElementById('fNote').value.trim(),
  };

  if(editingId){ evts = evts.map(function(e){ return e.id===editingId?evt:e; }); }
  else { evts.push(evt); }
  save(); fermerModal(); render();
  toast(editingId?'✎ Modifié !':'✦ Ajouté !');
}

function supprimerEvt(id){
  if(!confirm('Supprimer ?')) return;
  evts = evts.filter(function(e){ return e.id!==id; });
  save(); render(); toast('Supprimé');
}

function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

// Rappels
function checkRappels(){
  var t = today();
  evts.filter(function(e){ return e.rappel && e.date>t; }).forEach(function(e){
    var j = daysUntil(e.date);
    if(parseInt(e.rappelJ||1)===j){
      toast('🔔 Rappel : '+e.titre+' dans '+j+' jour'+(j>1?'s':'')+'!');
    }
  });
}

// ─── INIT ─────────────────────────────────────────────────────────────────
render();
setInterval(checkRappels, 3600000);
document.addEventListener('keydown', function(ev){ if(ev.key==='Escape') fermerModal(); });
</script>
</body>
</html>
